name: Pay Engine - Android Build

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      # 📥 Clonar repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ⚙️ Dependências do sistema
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git zip unzip \
            openjdk-17-jdk python3-pip \
            python3-setuptools python3-wheel \
            libffi-dev libssl-dev wget tar

      # 📦 Instalar Buildozer
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # 🤖 Instalar Android SDK + aceitar licenças + AIDL
      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-*.zip

          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true

          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "tools"

      # ⚙️ Criar buildozer.spec se não existir
      - name: Init Buildozer
        run: |
          buildozer init || true

      # ⚙️ Configurar buildozer
      - name: Configure buildozer.spec
        run: |
          sed -i 's/title = .*/title = PayEngine/g' buildozer.spec
          sed -i 's/package.name = .*/package.name = payengine/g' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.payengine/g' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy/g' buildozer.spec
          sed -i 's/android.api = .*/android.api = 33/g' buildozer.spec
          sed -i 's/android.build_tools = .*/android.build_tools = 33.0.2/g' buildozer.spec
          sed -i 's/source.include_exts = .*/source.include_exts = py,png,jpg,ogg,json/g' buildozer.spec
          sed -i 's/orientation = .*/orientation = landscape/g' buildozer.spec

      # 🚀 Build APK
      - name: Build APK
        run: |
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          buildozer -v android debug

      # 📤 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PayEngine-Android
          path: bin/*.apk