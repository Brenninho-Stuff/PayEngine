name: Pay Engine - Build Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 📥 Clonar repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Instalar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 📦 Instalar dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

      # ⚙️ Buildar EXE
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed source/main.py --name PayEngine

      # 📤 Salvar build como artefato
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PayEngine-Windows
          path: dist/PayEngine.exe